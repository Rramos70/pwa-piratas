<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Piratas de Tenerife - Panel de Control</title>
  <link rel="stylesheet" href="styles.css">
  <meta name="theme-color" content="#2E7D32">
  <style>
    .admin-container { max-width: 600px; margin: 20px auto; padding: 15px; }
    .form-section { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; margin-bottom: 4px; font-weight: bold; font-size: 14px; }
    .btn-admin { width: 100%; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 15px; margin-top: 5px; }
    .btn-primary { background-color: #2E7D32; color: white; }
    .btn-danger { background-color: #c62828; color: white; }
  </style>

  <!-- ================================================================= -->
  <!-- 1. LIBRERÍAS DE FIREBASE OBLIGATORIAS (Carga prioritaria)         -->
  <!-- ================================================================= -->
  <!-- Core Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <!-- Firebase Authentication SDK (essential for secure access control) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <!-- Firebase Realtime Database SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>
<body>
  <div class="mobile-app-wrapper">
    <header class="main-header">
      <div class="header-container">
        <h1>⚙️ Panel de Administración</h1>
        <p class="subtitle">Gestión de Encuentros y Eventos</p>
      </div>
    </header>

    <main class="app-container admin-container">
      <!-- ACTUALIZAR PRÓXIMO PARTIDO -->
      <section class="card form-section">
        <h2>🥎 Actualizar Próximo Partido</h2>
        <form id="form-next-match" onsubmit="guardarProximoPartido(event)">
          <div class="form-group">
            <label for="input-rival">Rival</label>
            <input type="text" id="input-rival" class="modern-input" required placeholder="Ej. Marineros de Tenerife">
          </div>
          <div class="form-group">
            <label for="input-tournament">Torneo / Liga</label>
            <input type="text" id="input-tournament" class="modern-input" placeholder="Ej. Liga de Verano 2026">
          </div>
          <div class="form-group">
            <label for="input-condition">Condición</label>
            <select id="input-condition" class="modern-input">
              <option value="Local">Local</option>
              <option value="Visitante">Visitante</option>
            </select>
          </div>
          <div class="form-group">
            <label for="input-date">Fecha</label>
            <input type="text" id="input-date" class="modern-input" required placeholder="Ej. 14 de Junio">
          </div>
          <div class="form-group">
            <label for="input-day">Día de la semana</label>
            <input type="text" id="input-day" class="modern-input" placeholder="Ej. Domingo">
          </div>
          <div class="form-group">
            <label for="input-time">Hora</label>
            <input type="time" id="input-time" class="modern-input" required>
          </div>
          <div class="form-group">
            <label for="input-stadium">Estadio</label>
            <input type="text" id="input-stadium" class="modern-input" required placeholder="Ej. Campo de Softbol El Burgado">
          </div>
          <button type="submit" class="btn-admin btn-primary">💾 Publicar Partido</button>
        </form>
      </section>

      <!-- RESETEAR ASISTENCIAS -->
      <section class="card form-section">
        <h2>⚠️ Control de Asistencias</h2>
        <p style="font-size:13px; color:#555; margin-bottom:10px;">Limpia la lista de confirmados y bajas para el nuevo partido programado.</p>
        <button type="button" class="btn-admin btn-danger" onclick="limpiarAsistencias()">🗑️ Reiniciar Lista de Asistencias</button>
      </section>
    </main>

    <!-- MENÚ DE NAVEGACIÓN -->
    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">🏠<span class="nav-label">Inicio</span></a>
      <a href="admin.html" class="nav-item active" id="nav-link-admin">🗓️<span class="nav-label">Partidos</span></a>
      <a href="usuarios.html" class="nav-item" id="nav-link-users">👥<span class="nav-label">Usuarios</span></a>
      <a href="javascript:void(0);" class="nav-item" onclick="cerrarSesion()">🚪<span class="nav-label">Salir</span></a>
    </nav>
  </div>

  <!-- ================================================================= -->
  <!-- 2. LÓGICA DE NEGOCIO CONTROLADA                                  -->
  <!-- ================================================================= -->
  <script>
    // =======================================================================================================
    // ATENCIÓN CRÍTICA DE SEGURIDAD:
    // El control de acceso basado únicamente en localStorage es EXTREMADAMENTE INSEGURO.
    // Un usuario puede modificar fácilmente 'softball_logged_user' en su navegador para simular ser un admin.
    // Para una aplicación real, DEBES usar Firebase Authentication junto con Firebase Realtime Database Security Rules
    // para controlar el acceso a funciones y datos sensibles basados en el rol del usuario autenticado.
    // =======================================================================================================

    // Variables globales para Firebase
    let db;
    let auth; // Se añade la referencia a Firebase Authentication

    // Configuración oficial de tu proyecto
    const firebaseConfig = {
      apiKey: "AIzaSyCVpr7XujBtSj6dB134rx3dLASgepWkJak",
      authDomain: "piratas-tenerife.firebaseapp.com", // CORREGIDO
      databaseURL: "https://piratas-tenerife-default-rtdb.europe-west1.firebasedatabase.app/", // CORREGIDO
      projectId: "piratas-tenerife",
      storageBucket: "piratas-tenerife.firebasestorage.app",
      messagingSenderId: "328725969132",
      appId: "1:328725969132:web:d1242cf35ed2e42b234dc9"
    };

    // Inicialización de Firebase
    try {
      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }
      db = firebase.database();
      auth = firebase.auth(); // Inicializamos Firebase Authentication
    } catch (e) {
      console.error("Fallo crítico al inicializar Firebase. Revisa la caché del navegador.", e);
    }

    // Control de acceso al cargar la página (INSEGURO, ver nota arriba)
    auth.onAuthStateChanged(user => {
      if (!user) {
        // No hay usuario autenticado, redirigir al login
        alert("Acceso denegado. Debes iniciar sesión.");
        window.location.href = "login.html";
        return;
      }
      // Si hay un usuario, comprobamos su rol (esto aún es INSEGURO si el rol no se verifica en el backend)
      const loguedUser = JSON.parse(localStorage.getItem('softball_logged_user'));
      if (!loguedUser || loguedUser.role !== 'admin') {
        alert("Acceso denegado. Se requieren permisos de Administrador.");
        window.location.href = "index.html";
      }
      // En un escenario seguro, el rol del usuario se obtendría de un campo personalizado
      // en el objeto de usuario de Firebase Authentication (custom claims)
      // o se verificaría en el backend a través de las reglas de seguridad de Realtime Database.
    });


    // Rellenar formulario con los datos guardados en la nube
    document.addEventListener('DOMContentLoaded', () => {
      if (db) { // Asegúrate de que db se ha inicializado correctamente
        db.ref('proximo_partido').once('value').then((snapshot) => {
          if (snapshot.exists()) {
            const data = snapshot.val();
            if(document.getElementById('input-rival')) document.getElementById('input-rival').value = data.rival || '';
            if(document.getElementById('input-tournament')) document.getElementById('input-tournament').value = data.torneo || '';
            if(document.getElementById('input-condition')) document.getElementById('input-condition').value = data.condicion || 'Local';
            if(document.getElementById('input-date')) document.getElementById('input-date').value = data.fecha || '';
            if(document.getElementById('input-day')) document.getElementById('input-day').value = data.dia || '';
            if(document.getElementById('input-time')) document.getElementById('input-time').value = data.hora || '';
            if(document.getElementById('input-stadium')) document.getElementById('input-stadium').value = data.stadium || '';
          }
        }).catch(err => console.error("Error al sincronizar datos:", err));
      } else {
        console.error("Firebase Realtime Database no está disponible.");
      }
    });

    function guardarProximoPartido(e) {
      e.preventDefault();
      if (db) { // Asegúrate de que db se ha inicializado correctamente
        db.ref('proximo_partido').set({
          rival: document.getElementById('input-rival').value.trim(),
          torneo: document.getElementById('input-tournament').value.trim(),
          condicion: document.getElementById('input-condition').value,
          fecha: document.getElementById('input-date').value.trim(),
          dia: document.getElementById('input-day').value.trim(),
          hora: document.getElementById('input-time').value,
          stadium: document.getElementById('input-stadium').value.trim()
        })
        .then(() => alert("¡Datos del encuentro publicados en la nube!"))
        .catch(err => alert("Error al guardar: " + err.message));
      } else {
        alert("Error: Firebase Realtime Database no está disponible para guardar los datos.");
      }
    }

    function limpiarAsistencias() {
      if (confirm("¿Deseas vaciar la lista de asistencias del partido actual?")) {
        if (db) { // Asegúrate de que db se ha inicializado correctamente
          db.ref('asistencias/partido_actual').remove()
            .then(() => alert("Lista de asistencias reiniciada correctamente."))
            .catch(err => alert("Error al limpiar: " + err.message));
        } else {
          alert("Error: Firebase Realtime Database no está disponible para limpiar las asistencias.");
        }
      }
    }

    function cerrarSesion() {
      if (confirm('¿Deseas cerrar tu sesión?')) {
        if (auth) { // Asegúrate de que auth se ha inicializado correctamente
          auth.signOut().then(() => {
            localStorage.removeItem('softball_logged_user'); // Limpia también el localStorage
            window.location.href = "login.html";
          }).catch((error) => {
            console.error("Error al cerrar sesión de Firebase:", error);
            alert("Error al cerrar sesión: " + error.message);
          });
        } else {
          localStorage.removeItem('softball_logged_user'); // Si Firebase Auth no está listo, solo limpia localStorage
          window.location.href = "login.html";
        }
      }
    }
  </script>
</body>
</html>
