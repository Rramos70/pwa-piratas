  <!-- Importar Firebase desde la Web -->
  <script src="https://gstatic.com"></script>
  <script src="https://gstatic.com"></script>

  <script>
    // 1. REEMPLAZA ESTO CON TUS DATOS REALES DE FIREBASE COPIADOS EN EL PASO 1
const firebaseConfig = {
  apiKey: "AIzaSyCVpr7XujBtSj6dB134rx3dLASgepWkJak",
  authDomain: "piratas-tenerife.firebaseapp.com",
  databaseURL: "https://piratas-tenerife-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "piratas-tenerife",
  storageBucket: "piratas-tenerife.firebasestorage.app",
  messagingSenderId: "328725969132",
  appId: "1:328725969132:web:d1242cf35ed2e42b234dc9"
};


    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function procesarLogin(e) {
      e.preventDefault();
      
      const txtName = document.getElementById('login-name').value.trim();
      const txtPassword = document.getElementById('login-password').value;
      const errorBox = document.getElementById('error-box');
      
      errorBox.style.display = 'none';

      // 2. Leer los usuarios en tiempo real desde Firebase
      db.ref('usuarios').once('value').then((snapshot) => {
        let listaUsuarios = [];
        
        if (snapshot.exists()) {
          // Si existen en la base de datos, los transformamos en array
          snapshot.forEach((childSnapshot) => {
            listaUsuarios.push({ id: childSnapshot.key, ...childSnapshot.val() });
          });
        } else {
          // Si la base de datos está vacía, usamos los administradores base
          listaUsuarios = [
            { id: 'usr_1', name: 'Administrador General', password: 'admin', role: 'admin', status: 'activo' },
            { id: 'usr_2', name: 'Invitado de Pruebas', password: 'guest', role: 'guest', status: 'activo' }
          ];
        }

        // 3. Buscar coincidencia
        const usuarioEncontrado = listaUsuarios.find(u => u.name.toLowerCase() === txtName.toLowerCase());

        if (!usuarioEncontrado) {
          errorBox.textContent = "El usuario ingresado no está registrado.";
          errorBox.style.display = 'block';
          return;
        }

        if (usuarioEncontrado.password !== txtPassword) {
          errorBox.textContent = "La contraseña es incorrecta.";
          errorBox.style.display = 'block';
          return;
        }

        if (usuarioEncontrado.status === 'inactivo') {
          errorBox.textContent = "Tu cuenta está desactivada. Contacta al administrador.";
          errorBox.style.display = 'block';
          return;
        }

        // Guardamos solo la sesión en local (para saber quién tiene el teléfono en la mano)
        const sesionUsuario = {
          id: usuarioEncontrado.id,
          role: usuarioEncontrado.role,
          name: usuarioEncontrado.name
        };
        
        localStorage.setItem('softball_logged_user', JSON.stringify(sesionUsuario));
        window.location.href = 'index.html';
      });
    }

    // Inyectar usuarios base en la nube si está completamente vacía la app
    document.addEventListener('DOMContentLoaded', () => {
      db.ref('usuarios').once('value').then((snapshot) => {
        if (!snapshot.exists()) {
          db.ref('usuarios/usr_1').set({ name: 'Administrador General', password: 'admin', phone: '000000000', birth: '1990-01-01', role: 'admin', status: 'activo' });
          db.ref('usuarios/usr_2').set({ name: 'Invitado de Pruebas', password: 'guest', phone: '111222333', birth: '1995-05-05', role: 'guest', status: 'activo' });
        }
      });
    });
  </script>
