<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Piratas de Tenerife - Iniciar Sesión</title>
  <link rel="stylesheet" href="styles.css">
  <meta name="theme-color" content="#2E7D32">
  <style>
    .login-container { max-width: 400px; margin: 40px auto; padding: 20px; text-align: center; }
    .form-group { text-align: left; margin-bottom: 15px; }
    .btn-login { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; background-color: #2E7D32; color: white; }
    .error-msg { color: #d32f2f; font-size: 14px; margin-top: 10px; display: none; font-weight: bold; }
  </style>

  <!-- ================================================================= -->
  <!-- CARGA PRIORITARIA DE LIBRERÍAS DE FIREBASE (Evita el ReferenceError) -->
  <!-- ================================================================= -->
  <!-- Core Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <!-- Firebase Authentication SDK (recommended for secure logins) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <!-- Firebase Realtime Database SDK (used for your current login logic) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

</head>
<body>
  <div class="mobile-app-wrapper">
    <div class="card login-container">
      <div style="display: flex; justify-content: center; margin-bottom: 12px;">
        <img src="logop.png" alt="Logotipo de Piratas de Tenerife" style="width: 65px; height: 65px; object-fit: contain;">
      </div>
      <h1><span aria-hidden="true">🥎</span> PIRATAS DE TENERIFE</h1>
      <p style="color: #555; margin-bottom: 20px;">Introduce tus credenciales para acceder</p>
      
      <form id="login-form" onsubmit="procesarLogin(event)">
        <div class="form-group">
          <label for="login-name" class="info-label" style="display:block; margin-bottom:4px;">Nombre y Apellido</label>
          <input type="text" id="login-name" class="modern-input" placeholder="Ej. Administrador General" required>
        </div>
        
        <div class="form-group">
          <label for="login-password" class="info-label" style="display:block; margin-bottom:4px;">Contraseña</label>
          <input type="password" id="login-password" class="modern-input" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn-login">🔑 Entrar al Equipo</button>
        <div id="error-box" class="error-msg"></div>
      </form>
    </div>
  </div>

  <!-- ================================================================= -->
  <!-- LÓGICA DE NEGOCIO SEGURA                                         -->
  <!-- ================================================================= -->
  <script>
    // Variables globales
    let db; // Variable para la instancia de Realtime Database
    let auth; // Variable para la instancia de Firebase Authentication

    // Configuración oficial de tu proyecto
    const firebaseConfig = {
      apiKey: "AIzaSyCVpr7XujBtSj6dB134rx3dLASgepWkJak",
      authDomain: "piratas-tenerife.firebaseapp.com", // CORREGIDO
      databaseURL: "https://piratas-tenerife-default-rtdb.europe-west1.firebasedatabase.app/",
      projectId: "piratas-tenerife",
      storageBucket: "piratas-tenerife.firebasestorage.app",
      messagingSenderId: "328725969132",
      appId: "1:328725969132:web:d1242cf35ed2e42b234dc9"
    };

    // Inicialización cuando las librerías del head estén 100% listas
    try {
      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }
      db = firebase.database();
      auth = firebase.auth(); // Inicializamos Firebase Authentication
    } catch (e) {
      console.error("Fallo crítico al inicializar Firebase. Revisa la caché del navegador.", e);
    }

    function procesarLogin(e) {
      e.preventDefault();
      
      const errorBox = document.getElementById('error-box');
      errorBox.style.display = 'none';

      // Validación de contingencia por si falló la red con Firebase
      if (!db) {
        errorBox.textContent = "Error: No se pudo conectar con el servidor de base de datos. Recarga la página.";
        errorBox.style.display = 'block';
        return;
      }

      const txtName = document.getElementById('login-name').value.trim();
      const txtPassword = document.getElementById('login-password').value;

      // ATENCIÓN: Esta implementación es INSEGURA para un sistema de login real.
      // Las contraseñas no deben guardarse en texto plano en la base de datos
      // y la lógica de autenticación no debe realizarse del lado del cliente de esta manera.
      // Se recomienda encarecidamente utilizar Firebase Authentication.
      db.ref('usuarios').once('value').then((snapshot) => {
        let listaUsuarios = [];
        
        if (snapshot.exists()) {
          snapshot.forEach((childSnapshot) => {
            listaUsuarios.push({ id: childSnapshot.key, ...childSnapshot.val() });
          });
        }

        const usuarioEncontrado = listaUsuarios.find(u => u.name && u.name.toLowerCase() === txtName.toLowerCase());

        if (!usuarioEncontrado) {
          errorBox.textContent = "El usuario ingresado no está registrado.";
          errorBox.style.display = 'block';
          return;
        }

        if (usuarioEncontrado.password !== txtPassword) {
          errorBox.textContent = "La contraseña es incorrecta.";
          errorBox.style.display = 'block';
          return;
        }

        if (usuarioEncontrado.status === 'inactivo') {
          errorBox.textContent = "Tu cuenta está desactivada. Contacta al administrador.";
          errorBox.style.display = 'block';
          return;
        }

        const sesionUsuario = {
          id: usuarioEncontrado.id,
          role: usuarioEncontrado.role || 'player',
          name: usuarioEncontrado.name
        };
        
        localStorage.setItem('softball_logged_user', JSON.stringify(sesionUsuario));
        window.location.href = "index.html";
      })
      .catch((error) => {
        console.error("Error en Firebase:", error);
        errorBox.textContent = "Error de conexión: " + error.message;
        errorBox.style.display = 'block';
      });
    }

    // Inicializar registros base si la base de datos está vacía al cargar el DOM
    document.addEventListener('DOMContentLoaded', () => {
      if (db) {
        db.ref('usuarios').once('value').then((snapshot) => {
          if (!snapshot.exists()) {
            // Solo creamos usuarios si no existen, para evitar sobrescribirlos en cada carga.
            db.ref('usuarios/usr_1').set({ name: 'Administrador General', password: 'admin', role: 'admin', status: 'activo' });
            db.ref('usuarios/usr_2').set({ name: 'Invitado de Pruebas', password: 'guest', role: 'guest', status: 'activo' });
            console.log("Usuarios iniciales creados.");
          }
        }).catch(err => console.error("Error al verificar o crear usuarios iniciales:", err));
      }
    });
  </script>
</body>
</html>
